name: Update dbt Environment on Tag

on:
  push:
    tags:
      - "**"

jobs:
  update-dbt-environment:
    runs-on: ubuntu-latest

    steps:
      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Get dbt environment details
        id: get_env
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
        run: |
          http_status=$(curl -s \
            -o /tmp/env_get_response.json \
            -w "%{http_code}" \
            -X GET \
            "https://cloud.getdbt.com/api/v3/accounts/${{ vars.DBT_ACCOUNT_ID }}/projects/${{ vars.DBT_PROJECT_ID }}/environments/${{ vars.DBT_ENVIRONMENT_ID }}/" \
            -H "Authorization: Bearer ${DBT_API_TOKEN}" \
            -H "Content-Type: application/json")

          echo "HTTP status: ${http_status}"
          cat /tmp/env_get_response.json

          if [[ "${http_status}" -lt 200 || "${http_status}" -ge 300 ]]; then
            echo "Failed to fetch environment details with HTTP status ${http_status}"
            exit 1
          fi

      - name: Update dbt environment custom branch
        id: update_env
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          jq --arg tag "${TAG_NAME}" \
            '.data | .custom_branch = $tag | .use_custom_branch = true' \
            /tmp/env_get_response.json > /tmp/env_update_body.json

          echo "Request body:"
          cat /tmp/env_update_body.json

          http_status=$(curl -s \
            -o /tmp/env_update_response.json \
            -w "%{http_code}" \
            -X POST \
            "https://cloud.getdbt.com/api/v3/accounts/${{ vars.DBT_ACCOUNT_ID }}/projects/${{ vars.DBT_PROJECT_ID }}/environments/${{ vars.DBT_ENVIRONMENT_ID }}/" \
            -H "Authorization: Bearer ${DBT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/env_update_body.json)

          echo "HTTP status: ${http_status}"
          cat /tmp/env_update_response.json

          if [[ "${http_status}" -lt 200 || "${http_status}" -ge 300 ]]; then
            echo "Environment update failed with HTTP status ${http_status}"
            exit 1
          fi

      - name: Trigger dbt job
        if: success()
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          http_status=$(curl -s \
            -o /tmp/job_response.json \
            -w "%{http_code}" \
            -X POST \
            "https://cloud.getdbt.com/api/v2/accounts/${{ vars.DBT_ACCOUNT_ID }}/jobs/${{ vars.DBT_JOB_ID }}/run/" \
            -H "Authorization: Bearer ${DBT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"cause\": \"Triggered by tag ${TAG_NAME}\"}")

          echo "HTTP status: ${http_status}"
          cat /tmp/job_response.json

          if [[ "${http_status}" -lt 200 || "${http_status}" -ge 300 ]]; then
            echo "Job trigger failed with HTTP status ${http_status}"
            exit 1
          fi
