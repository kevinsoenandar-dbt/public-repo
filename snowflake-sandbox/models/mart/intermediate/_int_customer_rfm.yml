models:
  - name: int_customer_rfm_segments
    description: >
      Intermediate Python model that computes RFM (Recency, Frequency, Monetary) scores
      and behavioural segments for each customer. Uses pandas pd.qcut() to assign
      quintile-based scores across all three dimensions — logic that would require
      multiple NTILE() window function CTEs in SQL. Consumed by mart-layer models
      for segment-level reporting.
    columns:
      - name: customer_id
        description: Primary key — unique identifier for the customer.
        data_tests:
          - not_null
          - unique
      - name: recency_days
        description: >
          Number of days since the customer's most recent order, relative to the
          latest order date in the dataset.
        data_tests:
          - not_null
      - name: order_frequency
        description: Total number of distinct orders placed by the customer.
        data_tests:
          - not_null
      - name: lifetime_value
        description: >
          Total revenue generated by the customer across all orders
          (sum of product_price from fct_order_items).
        data_tests:
          - not_null
      - name: rfm_score
        description: >
          Three-digit composite score combining R, F, and M quintile scores
          (e.g. "554" = high recency, high frequency, high monetary value).
        data_tests:
          - not_null
      - name: customer_segment
        description: >
          Human-readable segment derived from the RFM score.
          Champions: best customers (high R + high F).
          Loyal Customers: buy regularly and recently.
          Potential Loyalists: recent buyers with moderate frequency.
          At-Risk: previously active but lapsing.
          Hibernating: lowest recency and frequency.
        data_tests:
          - not_null
          - accepted_values:
              values:
                - Champions
                - Loyal Customers
                - Potential Loyalists
                - At-Risk
                - Hibernating
